<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <!-- Chip body: subtle blue gradient, lighter toward top for a lit edge -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Die: cool dark gray, reads as a recessed cavity -->
    <linearGradient id="dieGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f5b62"/>
      <stop offset="1" stop-color="#263238"/>
    </linearGradient>
  </defs>

  <!-- ── Shadow ───────────────────────────────────────────── -->
  <rect x="4" y="6" width="40" height="40" rx="6" fill="#000" opacity=".18"/>

  <!-- ── Chip body ────────────────────────────────────────── -->
  <rect x="4" y="4" width="40" height="40" rx="6" fill="url(#bodyGrad)"/>

  <!-- ── Top-edge highlight (inset, 1.5px tall) ──────────── -->
  <path d="M10 4h28a6 6 0 0 1 6 6v1.5a6 6 0 0 1-6 6H10a6 6 0 0 1-6-6V10a6 6 0 0 1 6-6z"
        fill="#fff" opacity=".12"/>

  <!-- ── Die ───────────────────────────────────────────────── -->
  <rect x="14" y="14" width="20" height="20" rx="4" fill="url(#dieGrad)"/>

  <!-- ── Die top-edge highlight ────────────────────────────── -->
  <path d="M18 14h12a4 4 0 0 1 4 4v1a4 4 0 0 0-4-4H18a4 4 0 0 0-4 4v-1a4 4 0 0 1 4-4z"
        fill="#fff" opacity=".08"/>

  <!-- ── Core ──────────────────────────────────────────────── -->
  <rect x="20" y="20" width="8" height="8" rx="2" fill="#141a1f" opacity=".6"/>

  <!-- ── Pins (3 per side, gold, circular, aligned to die) ── -->
  <g fill="#ffd54f">
    <!-- top -->
    <circle cx="18.25" cy="9" r="1.5"/>
    <circle cx="24"    cy="9" r="1.5"/>
    <circle cx="29.75" cy="9" r="1.5"/>
    <!-- bottom -->
    <circle cx="18.25" cy="39" r="1.5"/>
    <circle cx="24"    cy="39" r="1.5"/>
    <circle cx="29.75" cy="39" r="1.5"/>
    <!-- left -->
    <circle cx="9"  cy="18.25" r="1.5"/>
    <circle cx="9"  cy="24"    r="1.5"/>
    <circle cx="9"  cy="29.75" r="1.5"/>
    <!-- right -->
    <circle cx="39" cy="18.25" r="1.5"/>
    <circle cx="39" cy="24"    r="1.5"/>
    <circle cx="39" cy="29.75" r="1.5"/>
  </g>
</svg>
